spring:
  application:
    name: AgentCopilot
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8080

agent:
  store:
    redis:
      enabled: ${AGENT_REDIS_ENABLED:true}
  task:
    auto-run: ${AGENT_TASK_AUTO_RUN:true}

# 千问大模型配置（兼容OpenAI接口）
langchain4j:
  open-ai:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${API_KEY}
    model-name: qwen-plus
    temperature: 0.1
    timeout: 120s
    log-requests: true
    log-responses: true


