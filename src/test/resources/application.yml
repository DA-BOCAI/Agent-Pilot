spring:
  application:
    name: AgentCopilot

server:
  port: 8080

agent:
  store:
    redis:
      enabled: true
  task:
    auto-run: false
  tool:
    lark-cli-timeout: 180s

langchain4j:
  open-ai:
    base-url: https://ark.cn-beijing.volces.com/api/v3
    api-key: ${LLM_API_KEY:}
    model-name: ${LLM_ENDPOINT_ID:}
    temperature: 0.1
    connect-timeout: 10s
    read-timeout: 300s
    stream: true
