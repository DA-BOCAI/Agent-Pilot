spring:
  application:
    name: AgentCopilot
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8080

agent:
  im:
    lark-cli-command: ${LARK_CLI_COMMAND:C:\Users\Swiftie\AppData\Roaming\npm\lark-cli.cmd}
    lark-cli-run-js: ${LARK_CLI_RUN_JS:C:\Users\Swiftie\AppData\Roaming\npm\node_modules\@larksuite\cli\scripts\run.js}
    bot-open-id: ${LARK_BOT_OPEN_ID:}
    bot-user-id: ${LARK_BOT_USER_ID:}
    group-requires-mention: ${AGENT_IM_GROUP_REQUIRES_MENTION:true}
    workspace-url: ${AGENT_WORKSPACE_URL:https://agent-pilot-nine.vercel.app}
    cards:
      enabled: ${AGENT_IM_CARDS_ENABLED:true}
    reply:
      enabled: ${AGENT_IM_REPLY_ENABLED:true}
    listener:
      enabled: ${AGENT_IM_LISTENER_ENABLED:true}
  store:
    redis:
      enabled: ${AGENT_REDIS_ENABLED:true}
  task:
    auto-run: ${AGENT_TASK_AUTO_RUN:false}
  tool:
    lark-cli-timeout: ${LARK_CLI_TIMEOUT:180s}

# 豆包大模型配置（兼容OpenAI接口）
langchain4j:
  open-ai:
    base-url: ${LLM_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
    api-key: ${LLM_API_KEY:}
    model-name: ${LLM_ENDPOINT_ID:}
    temperature: ${LLM_TEMPERATURE:0.1}
    connect-timeout: ${LLM_CONNECT_TIMEOUT:10s}
    read-timeout: ${LLM_READ_TIMEOUT:300s}



