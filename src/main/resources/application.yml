spring:
  application:
    name: AgentCopilot
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8080

agent:
  store:
    redis:
      enabled: ${AGENT_REDIS_ENABLED:true}
  task:
    auto-run: ${AGENT_TASK_AUTO_RUN:false}
  tool:
    lark-cli-timeout: ${LARK_CLI_TIMEOUT:180s}

# 豆包大模型配置（兼容OpenAI接口）
langchain4j:
  open-ai:
    base-url: ${LLM_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
    api-key: ${LLM_API_KEY:}
    model-name: ${LLM_ENDPOINT_ID:}
    temperature: ${LLM_TEMPERATURE:0.1}
    connect-timeout: ${LLM_CONNECT_TIMEOUT:10s}
    read-timeout: ${LLM_READ_TIMEOUT:300s}



